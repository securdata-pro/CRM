name: Supabase keepalive
on:
  schedule:
    - cron: '17 6 * * *'      # ogni giorno alle 06:17 UTC
  workflow_dispatch:           # avvio manuale dal tab Actions
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://sluywittstmwnuqrbdkz.supabase.co/rest/v1/keepalive?select=id&limit=1" \
            -H "apikey: sb_publishable_HMPBii9lLPG5uZMrcp8o8Q_-17e5zv9" \
            -H "Authorization: Bearer sb_publishable_HMPBii9lLPG5uZMrcp8o8Q_-17e5zv9")
          echo "HTTP $code"
          test "$code" = "200"
